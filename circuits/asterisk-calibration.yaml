# Calibration Circuit
#
# Measures RCA quality by running the analysis pipeline against a
# dataset of known failures with ground-truth expectations, then
# scoring and aggregating the results into M1-M20 metrics.
#
# Three modes (see project-standards.mdc for full definitions):
#   stub  — deterministic (no LLM), validates circuit machinery
#   dry   — real LLM + synthetic data, validates prompts
#   wet   — real LLM + production data, the final acceptance gate
#
# Usage:
#   just calibrate-stub          # fast, after every code change
#   just calibrate-wet           # slow, only when dry passes consistently

circuit: asterisk-calibration
description: "Calibration circuit — setup cases, run RCA, score, aggregate metrics, report"
imports:
  - rca

# Calibration tuning:
#   parallel   — concurrent case walkers (1 = serial, safe default)
#   runs       — number of full runs for variance measurement (M20)
#   token_budget — max tokens per run (0 = unlimited)
#   batch_size — cases per batch (0 = all at once)
vars:
  parallel: 1
  runs: 1
  token_budget: 0
  batch_size: 0

nodes:
  - name: setup
    family: calibration-setup
    description: "Create store scaffolding: suite, versions, circuits, launches, jobs, cases"

  - name: run-cases
    family: calibration-run-cases
    description: "Execute the RCA circuit for each case (serial or parallel via WalkTeam)"

  - name: score
    family: calibration-score
    description: "Score each case result against ground truth expectations"

  - name: aggregate
    family: calibration-aggregate
    description: "Compute M1-M20 metrics from scored case results"

  - name: report
    family: calibration-report
    description: "Generate the final CalibrationReport with metrics, case details, and dataset health"

edges:
  - id: CAL1
    name: setup-done
    from: setup
    to: run-cases
    when: "true"

  - id: CAL2
    name: cases-done
    from: run-cases
    to: score
    when: "true"

  - id: CAL3
    name: scored
    from: score
    to: aggregate
    when: "true"

  - id: CAL4
    name: aggregated
    from: aggregate
    to: report
    when: "true"

  - id: CAL5
    name: reported
    from: report
    to: DONE
    when: "true"

start: setup
done: DONE
