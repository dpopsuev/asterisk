# Data Ingestion Circuit
#
# Automatically discovers new CI failures from ReportPortal, matches
# them against known symptom patterns, deduplicates against the existing
# dataset, and creates candidate cases for human review.
#
# Triggered by: asterisk consume run
# Human supervision: asterisk dataset review / promote
circuit: asterisk-ingest
description: "Fetch new CI failures from RP, create candidate cases, grow the dataset"

nodes:
  - name: fetch_launches
    description: "Query RP for recent launches; extract test items with failures"
    element: water
    family: ingest.fetch
    edges:
      - name: launches fetched
        to: parse_failures
        when: "len(output.launches) > 0"
      - name: no launches
        to: _done
        shortcut: true
        when: "len(output.launches) == 0"

  - name: parse_failures
    description: "Parse test-item logs into structured failure records with stack traces"
    element: fire
    family: ingest.parse
    edges:
      - name: failures parsed
        to: match_symptoms
        when: "len(output.failures) > 0"
      - name: no failures
        to: _done
        shortcut: true
        when: "len(output.failures) == 0"

  - name: match_symptoms
    description: "Match failures against known symptom patterns from the vocabulary"
    element: earth
    family: ingest.match
    edges: [deduplicate]

  - name: deduplicate
    description: "Filter out failures already present in the dataset"
    element: earth
    family: ingest.dedup
    edges:
      - name: deduplicated
        to: create_candidates
        when: "len(output.new_cases) > 0"
      - name: all duplicates
        to: notify_review
        shortcut: true
        when: "len(output.new_cases) == 0"

  - name: create_candidates
    description: "Create candidate case entries for new failures"
    element: fire
    family: ingest.candidate
    edges: [notify_review]

  - name: notify_review
    description: "Queue candidates for human review and promotion to the dataset"
    element: air
    family: ingest.notify
    edges: [_done]

start: fetch_launches
done: _done
