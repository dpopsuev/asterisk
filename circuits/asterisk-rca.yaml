# RCA Investigation Circuit
#
# The core analysis pipeline. Each test failure (case) walks this graph
# from Recall to Report. Edges encode routing logic — confidence
# thresholds, shortcut conditions, and loop limits — so the circuit
# adapts its depth to each failure's complexity.
#
# Pipeline overview:
#   F0 Recall     → pattern-match against known failures database
#   F1 Triage     → classify symptom category, pick candidate repos
#   F2 Resolve    → select next repo to investigate
#   F3 Investigate → deep-dive: log analysis, commit correlation, evidence
#   F4 Correlate  → cross-reference findings, detect serial killers
#   F5 Review     → adversarial quality gate (approve / reassess / overturn)
#   F6 Report     → produce final structured RCA
#
# Shortcuts allow fast paths: high-confidence recall hits skip straight
# to Review; infra/flake triages bypass investigation entirely.

circuit: asterisk-rca
description: "Root-cause analysis circuit (F0 Recall through F6 Report)"
imports:
  - rca

# Tuning knobs — adjust these to control routing sensitivity.
#   recall_hit:             confidence above which recall skips to review
#   recall_uncertain:       confidence band where recall still routes to triage
#   convergence_sufficient: investigation convergence score to proceed to correlate
#   max_investigate_loops:  how many resolve→investigate iterations before giving up
#   correlate_dup:          confidence above which a duplicate match terminates early
vars:
  recall_hit: 0.80
  recall_uncertain: 0.40
  convergence_sufficient: 0.50
  max_investigate_loops: 1
  correlate_dup: 0.80

nodes:
  - name: recall
    description: "Pattern-match against known failures database; shortcut to review on high-confidence hit"
    family: recall
    after: [store.recall]
  - name: triage
    description: "Classify failure symptom (infra, flake, product bug) and select candidate repos"
    family: triage
    after: [store.triage]
  - name: resolve
    description: "Select the next repo to investigate from the candidate set"
    family: resolve
  - name: investigate
    description: "Deep-dive into a single repo: log analysis, commit correlation, evidence gathering"
    family: investigate
    after: [store.investigate]
  - name: correlate
    description: "Cross-reference findings across repos; detect duplicates against prior RCAs"
    family: correlate
    after: [store.correlate]
  - name: review
    description: "Adversarial quality gate: approve, reassess, or overturn the draft RCA"
    family: review
    after: [store.review]
  - name: report
    description: "Produce the final structured RCA with defect type, confidence, and evidence links"
    family: report

edges:
  # ── F0 Recall ──
  # High confidence → skip investigation, go straight to review
  - id: H1
    name: recall-hit
    from: recall
    to: review
    shortcut: true
    when: "output.match == true && output.confidence >= config.recall_hit"
  # Uncertain match → still worth triaging
  - id: H3
    name: recall-uncertain
    from: recall
    to: triage
    when: "output.match == true && output.confidence >= config.recall_uncertain && output.confidence < config.recall_hit"
  # No match → full investigation path
  - id: H2
    name: recall-miss
    from: recall
    to: triage
    when: "output.match != true"

  # ── F1 Triage ──
  # Infrastructure and flake failures skip deep investigation
  - id: H4
    name: triage-skip-infra
    from: triage
    to: review
    shortcut: true
    when: 'output.symptom_category == "infra"'
  - id: H5
    name: triage-skip-flake
    from: triage
    to: review
    shortcut: true
    when: 'output.symptom_category == "flake"'
  # Explicit skip flag (set by triage when investigation is pointless)
  - id: H18
    name: triage-skip-investigation
    from: triage
    to: review
    shortcut: true
    when: "output.skip_investigation == true"
  # Only one candidate repo → skip resolve, go straight to investigate
  - id: H7
    name: triage-single-repo
    from: triage
    to: investigate
    shortcut: true
    when: "output.skip_investigation != true && len(output.candidate_repos) == 1"
  # H7b "triage-hypothesis-repo" is a runner-level interception
  # (calibrate/parallel.go) that deterministically resolves repos from
  # workspace Purpose metadata when the triage hypothesis matches.
  # Multiple candidate repos → resolve picks which to investigate first
  - id: H6
    name: triage-investigate
    from: triage
    to: resolve
    when: "output.skip_investigation != true"

  # ── F2 Resolve ──
  - id: H8
    name: resolve-multi
    from: resolve
    to: investigate
    when: "true"

  # ── F3 Investigate ──
  # Sufficient evidence gathered → move to cross-reference
  - id: H9
    name: investigate-converged
    from: investigate
    to: correlate
    when: "output.convergence_score >= config.convergence_sufficient"
  # Low convergence but no evidence at all → move on rather than loop
  - id: H10a
    name: investigate-no-evidence-skip
    from: investigate
    to: correlate
    when: "output.convergence_score < config.convergence_sufficient && len(output.evidence_refs) == 0"
  # Low convergence with some evidence → try another repo (loop)
  - id: H10
    name: investigate-low
    from: investigate
    to: resolve
    loop: true
    when: "output.convergence_score < config.convergence_sufficient && len(output.evidence_refs) > 0 && state.loops.investigate < config.max_investigate_loops"
  # Loop budget exhausted → send what we have to review
  - id: H11
    name: investigate-exhausted
    from: investigate
    to: review
    shortcut: true
    when: "output.convergence_score < config.convergence_sufficient && state.loops.investigate >= config.max_investigate_loops"

  # ── F4 Correlate ──
  # High-confidence duplicate → terminate early (no report needed)
  - id: H15
    name: correlate-dup
    from: correlate
    to: DONE
    when: "output.is_duplicate == true && output.confidence >= config.correlate_dup"
  # Otherwise proceed to review
  - id: H15b
    name: correlate-proceed
    from: correlate
    to: review
    when: "true"

  # ── F5 Review ──
  # Approve → finalize report
  - id: H12
    name: review-approve
    from: review
    to: report
    when: 'output.decision == "approve"'
  # Reassess → gather more evidence (loop back to resolve)
  - id: H13
    name: review-reassess
    from: review
    to: resolve
    loop: true
    when: 'output.decision == "reassess"'
  # Overturn → produce report with reviewer's corrected assessment
  - id: H14
    name: review-overturn
    from: review
    to: report
    when: 'output.decision == "overturn"'

  # ── F6 Report ──
  - id: FALLBACK
    name: report-done
    from: report
    to: DONE
    when: "true"

start: recall
done: DONE
