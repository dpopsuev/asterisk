kind: circuit
version: v1
metadata:
  name: rca
  description: "Core RCA investigation pipeline"

# Consumer overlay: imports RCA base from origami/schematics/rca/circuit.yaml,
# extends analysis zone with gather-code (Harvester subgraph), and routes
# triage-investigate through gather-code instead of directly to resolve.

import: rca
circuit: rca

zones:
  analysis:
    nodes: [gather-code, resolve, investigate]

nodes:
  - name: gather-code
    description: "Gather code context from source repositories via Harvester circuit"
    handler_type: circuit
    handler: harvester
    approach: methodical
    before: [inject.code-keywords]
    after: [bridge.code-context]
    edges:
      - name: gather-code-resolve
        to: resolve
        when: "true"

edges:
  - id: triage-investigate
    name: triage-investigate
    from: triage
    to: gather-code
    when: "output.skip_investigation != true"

# Port declarations for cross-circuit composition and calibration
ports:
  - name: post-triage
    direction: out
    type: rca.TriageResult
    description: "Triage output forwarded to Harvester for code context"
  - name: code-context
    direction: in
    type: harvester.CodeContext
    description: "Code context returned from Harvester"

# Wiring: connect RCA ports to Harvester
wiring:
  - from: rca.out:post-triage
    to: harvester.in:keywords

# Calibration contract: maps circuit outputs to scorer-addressable fields
calibration:
  outputs:
    - field: output.defect_type
      scorer_name: rca_defect_type
      type: string
    - field: output.symptom_category
      scorer_name: actual_category
      type: string
    - field: output.convergence_score
      scorer_name: actual_convergence
      type: float
    - field: output.component
      scorer_name: actual_component
      type: string
    - field: output.evidence_refs
      scorer_name: actual_evidence_refs
      type: array
    - field: output.rca_message
      scorer_name: actual_rca_message
      type: string
