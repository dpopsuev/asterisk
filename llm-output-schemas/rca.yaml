kind: artifact-schema
version: v1
metadata:
  name: rca-output-schemas
  description: "LLM output schemas for all RCA circuit stages"

stages:
  F0_RECALL:
    fields:
      match:
        type: bool
        required: true
      confidence:
        type: float
        required: true
      reasoning:
        type: string
        required: true

  F1_TRIAGE:
    fields:
      symptom_category:
        type: string
        required: true
      severity:
        type: string
        required: true
      defect_type_hypothesis:
        type: string
        required: true
      candidate_repos:
        type: array
        required: false
      skip_investigation:
        type: bool
        required: false
      cascade_suspected:
        type: bool
        required: false

  F2_RESOLVE:
    fields:
      selected_repos:
        type: array
        required: true

  F3_INVESTIGATE:
    fields:
      rca_message:
        type: string
        required: true
      defect_type:
        type: string
        required: true
      component:
        type: string
        required: true
      convergence_score:
        type: float
        required: false
      evidence_refs:
        type: array
        required: false

  F4_CORRELATE:
    fields:
      is_duplicate:
        type: bool
        required: true
      confidence:
        type: float
        required: true

  F5_REVIEW:
    fields:
      decision:
        type: string
        required: true

  F6_REPORT:
    fields:
      defect_type:
        type: string
        required: true
      case_id:
        type: string
        required: true
      summary:
        type: string
        required: true
