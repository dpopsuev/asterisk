# Asterisk Application Manifest
#
# `origami fold` reads this file and generates a unified binary (bin/asterisk)
# that embeds domain assets, wires connectors to schematics via declarative
# bindings, and serves both domain data and the RCA circuit over MCP.

name: asterisk
description: Evidence-based RCA for ReportPortal test failures
version: "1.0"

# --- Declarative binding: schematics + connectors ---

schematics:
  rca:
    path: schematics/rca
    bindings:
      source:    reportportal
      knowledge: knowledge
  knowledge:
    path: schematics/knowledge
    bindings:
      git:  github
      docs: docs

connectors:
  reportportal:
    path: connectors/rp
  github:
    path: connectors/github
  docs:
    path: connectors/docs

# --- Domains: operator-specific data auto-discovered by fold ---

domains: [ocp/ptp]

# --- Domain data: embedded assets served over MCP ---

domain_serve:
  port: 9300

  store:
    engine: sqlite
    schema: db-schema.yaml

  assets:
    vocabulary: vocabulary.yaml

    circuits:
      rca: circuits/rca.yaml
      calibration: circuits/calibration.yaml
      knowledge: circuits/knowledge.yaml

    prompts:
      recall:      prompts/recall/judge-similarity.md
      triage:      prompts/triage/classify-symptoms.md
      resolve:     prompts/resolve/select-repo.md
      investigate: prompts/investigate/deep-rca.md
      correlate:   prompts/correlate/match-cases.md
      review:      prompts/review/present-findings.md
      review-gap:  prompts/review/gap-analysis.md
      report:      prompts/report/regression-table.md

    schemas:
      rca: llm-output-schemas/rca.yaml

    scorecards:
      rca: scorecards/rca.yaml

    reports:
      rca:         reports/rca-report.yaml
      calibration: reports/calibration-report.yaml
      transcript:  reports/transcript-report.yaml
