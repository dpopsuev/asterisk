# Prompt Manifest
#
# Maps each RCA circuit step (F0-F6) to its LLM prompt template and
# declares which calibration metrics that step's output affects.
#
# Structure:
#   families    — one entry per circuit step
#     step            — circuit step ID (matches node family in the circuit YAML)
#     template        — path to the Markdown prompt template (relative to prompts/)
#     affected_metrics — metrics scored against this step's output (see scorecard)
#     output_schema   — JSON schema the LLM response must conform to
#
#   references  — supplementary documents injected into prompts
#     path            — path to the reference document
#     referenced_by   — which steps include this document
#     purpose         — what the document provides

families:
  - step: F0_RECALL
    template: recall/judge-similarity.md
    affected_metrics: [M3, M4]
    output_schema: recall-result.json
  - step: F1_TRIAGE
    template: triage/classify-symptoms.md
    affected_metrics: [M2, M6, M7]
    output_schema: triage-result.json
  - step: F2_RESOLVE
    template: resolve/select-repo.md
    affected_metrics: [M9, M10, M11]
    output_schema: resolve-result.json
  - step: F3_INVESTIGATE
    template: investigate/deep-rca.md
    affected_metrics: [M1, M8, M12, M13, M14, M14b, M15]
    output_schema: artifact.json
  - step: F4_CORRELATE
    template: correlate/match-cases.md
    affected_metrics: [M5]
    output_schema: correlate-result.json
  - step: F5_REVIEW
    template: review/present-findings.md
    affected_metrics: [M16]
    output_schema: review-decision.json
  - step: F6_REPORT
    template: report/regression-table.md
    affected_metrics: []
    output_schema: jira-draft.json

references:
  - path: review/gap-analysis.md
    referenced_by: [F3_INVESTIGATE]
    purpose: "Evidence gap categories and output format for gap_brief field"
