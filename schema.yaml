version: 1

tables:
  - name: schema_version
    auto_id: false
    columns:
      - version: integer not_null

  # Tier 1: Investigation-scoped entities

  - name: investigation_suites
    columns:
      - name: text not_null
      - description: text
      - status: text not_null default='open'
      - created_at: text not_null
      - closed_at: text

  - name: versions
    columns:
      - label: text not_null unique
      - build_id: text

  - name: circuits
    columns:
      - suite_id: integer not_null -> investigation_suites
      - version_id: integer not_null -> versions
      - name: text not_null
      - source_run_id: text
      - status: text not_null
      - started_at: text
      - ended_at: text
    indexes:
      - [suite_id]

  - name: launches
    columns:
      - circuit_id: integer not_null -> circuits
      - source_run_id: text
      - source_run_uuid: text
      - name: text
      - status: text
      - started_at: text
      - ended_at: text
      - env_attributes: text
      - git_branch: text
      - git_commit: text
      - envelope_payload: blob
    unique:
      - [circuit_id, source_run_id]
    indexes:
      - [circuit_id]

  - name: jobs
    columns:
      - launch_id: integer not_null -> launches
      - source_item_id: text
      - name: text not_null
      - clock_type: text
      - status: text
      - stats_total: integer
      - stats_failed: integer
      - stats_passed: integer
      - stats_skipped: integer
      - started_at: text
      - ended_at: text
    unique:
      - [launch_id, source_item_id]
    indexes:
      - [launch_id]

  - name: cases
    columns:
      - job_id: integer not_null -> jobs
      - launch_id: integer not_null -> launches
      - source_item_id: text
      - name: text not_null default=''
      - external_ref: text
      - status: text not_null default='open'
      - symptom_id: integer -> symptoms
      - rca_id: integer -> rcas
      - error_message: text
      - log_snippet: text
      - log_truncated: integer default=0
      - started_at: text
      - ended_at: text
      - created_at: text not_null
      - updated_at: text not_null
    unique:
      - [launch_id, source_item_id]
    indexes:
      - [symptom_id]
      - [rca_id]
      - [launch_id]
      - [job_id]

  - name: triages
    columns:
      - case_id: integer not_null unique -> cases
      - symptom_category: text not_null
      - severity: text
      - defect_type_hypothesis: text
      - skip_investigation: integer default=0
      - clock_skew_suspected: integer default=0
      - cascade_suspected: integer default=0
      - candidate_repos: text
      - data_quality_notes: text
      - created_at: text not_null

  # Tier 2: Global knowledge entities

  - name: symptoms
    columns:
      - fingerprint: text not_null unique
      - name: text not_null
      - description: text
      - error_pattern: text
      - test_name_pattern: text
      - component: text
      - severity: text
      - first_seen_at: text not_null
      - last_seen_at: text not_null
      - occurrence_count: integer not_null default=1
      - status: text not_null default='active'
    indexes:
      - [fingerprint]

  - name: rcas
    columns:
      - title: text not_null
      - description: text not_null default=''
      - defect_type: text not_null
      - category: text
      - component: text
      - affected_versions: text
      - evidence_refs: text
      - convergence_score: real
      - jira_ticket_id: text
      - jira_link: text
      - status: text not_null default='open'
      - created_at: text not_null
      - resolved_at: text
      - verified_at: text
      - archived_at: text

  - name: symptom_rca
    columns:
      - symptom_id: integer not_null -> symptoms
      - rca_id: integer not_null -> rcas
      - confidence: real
      - notes: text
      - linked_at: text not_null
    unique:
      - [symptom_id, rca_id]
    indexes:
      - [symptom_id]
      - [rca_id]
