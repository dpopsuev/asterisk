# Asterisk Database Schema
#
# Defines every SQLite table used by Asterisk's RCA store. Parsed by
# Origami's connectors/sqlite package at build time and embedded into
# the binary via the `store.schema` binding in origami.yaml.
#
# Syntax guide (Origami schema DSL):
#   Shorthand column:  column_name: type [modifiers...]
#     Modifiers: not_null, unique, pk, auto, default=VALUE
#     Foreign key:  -> table          (expands to table(id))
#                   -> table(column)  (explicit column)
#   Implicit id:  Every table gets an auto-increment integer PK named
#                 "id" unless one is already defined or auto_id: false.
#   Table-local indexes:  indexes: [[col1], [col2, col3]]
#                 Auto-named idx_{table}_{columns}.
#
# Data model overview:
#   Tier 1 — Investigation-scoped: entities created per CI run
#     investigation_suites → versions → circuits → launches → jobs → cases → triages
#   Tier 2 — Global knowledge: shared across investigations
#     symptoms (fingerprinted failure patterns)
#     rcas     (root-cause analyses, linked to symptoms via symptom_rca)

version: 1

tables:
  # Tracks which schema version the database was created with.
  # auto_id: false because this table holds a single row, not a collection.
  - name: schema_version
    auto_id: false
    columns:
      - version: integer not_null

  # ──────────────────────────────────────────────────────────────────
  # Tier 1: Investigation-scoped entities
  # Created fresh for each CI run / analysis session.
  # ──────────────────────────────────────────────────────────────────

  # A logical grouping of related analysis runs (e.g. "PTP 4.20 regression hunt").
  - name: investigation_suites
    columns:
      - name: text not_null
      - description: text
      - status: text not_null default='open'
      - created_at: text not_null
      - closed_at: text

  # Software versions under test (e.g. "OCP 4.20", "OCP 4.21").
  - name: versions
    columns:
      - label: text not_null unique
      - build_id: text

  # A CI pipeline execution within a suite, targeting a specific version.
  - name: circuits
    columns:
      - suite_id: integer not_null -> investigation_suites
      - version_id: integer not_null -> versions
      - name: text not_null
      - source_run_id: text
      - status: text not_null
      - started_at: text
      - ended_at: text
    indexes:
      - [suite_id]

  # Individual CI launches (ReportPortal "launches") within a circuit.
  # envelope_payload stores the raw fetched data for reproducibility.
  - name: launches
    columns:
      - circuit_id: integer not_null -> circuits
      - source_run_id: text
      - source_run_uuid: text
      - name: text
      - status: text
      - started_at: text
      - ended_at: text
      - env_attributes: text
      - git_branch: text
      - git_commit: text
      - envelope_payload: blob
    unique:
      - [circuit_id, source_run_id]
    indexes:
      - [circuit_id]

  # Test jobs (RP "suites") — groups of related test cases within a launch.
  - name: jobs
    columns:
      - launch_id: integer not_null -> launches
      - source_item_id: text
      - name: text not_null
      - clock_type: text
      - status: text
      - stats_total: integer
      - stats_failed: integer
      - stats_passed: integer
      - stats_skipped: integer
      - started_at: text
      - ended_at: text
    unique:
      - [launch_id, source_item_id]
    indexes:
      - [launch_id]

  # Individual test failures — the primary unit of RCA analysis.
  # Each case links to a symptom (pattern match) and an rca (conclusion).
  - name: cases
    columns:
      - job_id: integer not_null -> jobs
      - launch_id: integer not_null -> launches
      - source_item_id: text
      - name: text not_null default=''
      - external_ref: text
      - status: text not_null default='open'
      - symptom_id: integer -> symptoms
      - rca_id: integer -> rcas
      - error_message: text
      - log_snippet: text
      - log_truncated: integer default=0
      - started_at: text
      - ended_at: text
      - created_at: text not_null
      - updated_at: text not_null
    unique:
      - [launch_id, source_item_id]
    indexes:
      - [symptom_id]
      - [rca_id]
      - [launch_id]
      - [job_id]

  # Triage decisions produced by F1_TRIAGE — one per case.
  # Determines routing: skip investigation, single-repo shortcut, or full analysis.
  - name: triages
    columns:
      - case_id: integer not_null unique -> cases
      - symptom_category: text not_null
      - severity: text
      - defect_type_hypothesis: text
      - skip_investigation: integer default=0
      - clock_skew_suspected: integer default=0
      - cascade_suspected: integer default=0
      - candidate_repos: text
      - data_quality_notes: text
      - created_at: text not_null

  # ──────────────────────────────────────────────────────────────────
  # Tier 2: Global knowledge entities
  # Shared across all investigations. Accumulate over time.
  # ──────────────────────────────────────────────────────────────────

  # Failure patterns identified by fingerprinting error messages and test names.
  # Used by F0_RECALL to shortcut known failures before investigation.
  - name: symptoms
    columns:
      - fingerprint: text not_null unique
      - name: text not_null
      - description: text
      - error_pattern: text
      - test_name_pattern: text
      - component: text
      - severity: text
      - first_seen_at: text not_null
      - last_seen_at: text not_null
      - occurrence_count: integer not_null default=1
      - status: text not_null default='active'
    indexes:
      - [fingerprint]

  # Completed root-cause analyses. Each RCA explains why failures occur
  # and links to evidence (commits, logs, CI data).
  - name: rcas
    columns:
      - title: text not_null
      - description: text not_null default=''
      - defect_type: text not_null
      - category: text
      - component: text
      - affected_versions: text
      - evidence_refs: text
      - convergence_score: real
      - jira_ticket_id: text
      - jira_link: text
      - status: text not_null default='open'
      - created_at: text not_null
      - resolved_at: text
      - verified_at: text
      - archived_at: text

  # Many-to-many link between symptoms and RCAs.
  # Multiple symptoms can share one root cause; one symptom can have
  # multiple candidate RCAs with different confidence scores.
  - name: symptom_rca
    columns:
      - symptom_id: integer not_null -> symptoms
      - rca_id: integer not_null -> rcas
      - confidence: real
      - notes: text
      - linked_at: text not_null
    unique:
      - [symptom_id, rca_id]
    indexes:
      - [symptom_id]
      - [rca_id]
