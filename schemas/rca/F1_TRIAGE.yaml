kind: artifact-schema
version: v1
metadata:
  name: F1_TRIAGE
  description: "Triage step artifact schema"

name: F1_TRIAGE
fields:
  symptom_category:
    type: string
    required: true
  severity:
    type: string
    required: true
  defect_type_hypothesis:
    type: string
    required: true
  candidate_repos:
    type: array
    required: false
  skip_investigation:
    type: bool
    required: false
  cascade_suspected:
    type: bool
    required: false
