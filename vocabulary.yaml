kind: vocabulary
version: v1
metadata:
  name: asterisk-vocabulary
  description: "Display names and codes for RCA domain"

enums:
  defect_types: [pb001, ab001, au001, si001, en001, fw001, nd001, ti001, ib003]
  stages: [F0, F1, F2, F3, F4, F5, F6]
  severity: [critical, high, medium, low, info]

defect_types:
  pb001: {long: Product Bug, description: "defect in the product code (operator, daemon, proxy, etc.)"}
  ab001: {long: Automation Bug, description: "defect in test code, CI config, or test infrastructure (alias)"}
  au001: {long: Automation Bug, description: "defect in test code, CI config, or test infrastructure"}
  si001: {long: System Issue, description: "systemic issue affecting multiple components or services"}
  en001: {long: Environment Issue, description: "infrastructure/environment issue (node, network, cluster, NTP, etc.)"}
  fw001: {long: Firmware Issue, description: "defect in firmware or hardware-adjacent code (NIC, FPGA, PHC)"}
  nd001: {long: No Defect, description: "test is correct, product is correct, flaky/transient/expected behavior"}
  ti001: {long: To Investigate, description: "insufficient data to classify; needs manual investigation"}
  ib003: {long: Infrastructure Bug, description: "defect in shared infrastructure (CI, cluster, tooling)"}

stages:
  F0:   Recall
  F1:   Triage
  F2:   Resolve
  F3:   Investigate
  F4:   Correlate
  F5:   Review
  F6:   Report
  INIT: Init
  DONE: Done

metrics:
  M1:   Defect Type Accuracy
  M2:   Symptom Category Accuracy
  M3:   Recall Hit Rate
  M4:   Recall False Positive Rate
  M5:   Serial Killer Detection
  M6:   Skip Accuracy
  M7:   Cascade Detection
  M8:   Convergence Calibration
  M9:   Repo Selection Precision
  M10:  Repo Selection Recall
  M11:  Red Herring Rejection
  M12:  Evidence Recall
  M13:  Evidence Precision
  M14:  RCA Message Relevance
  M14b: Smoking Gun Hit Rate
  M15:  Component Identification
  M16:  Pipeline Path Accuracy
  M17:  Loop Efficiency
  M18:  Total Prompt Tokens
  M19:  Overall Accuracy
  M20:  Run Variance

decisions:
  H1:  Recall Hit
  H2:  Recall Miss
  H3:  Recall Uncertain
  H4:  Triage Investigate
  H5:  Triage Skip
  H6:  Triage Cascade
  H7:  Resolve Single Repo
  H8:  Resolve Multi Repo
  H9:  Investigate Converged
  H10: Investigate Loop
  H11: Investigate Exhausted
  H12: Correlate Duplicate
  H13: Correlate Unique
  H14: Review Approve
  H15: Review Reassess
  H16: Review Overturn
  H17: Report Emit
  H18: Investigate Reopen
